<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Redirection - Fit Transform</title>
    <style>
      :root {
        color-scheme: dark;
        background: #05070a;
        color: #f7fff7;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        align-items: center;
        display: flex;
        min-height: 100vh;
        justify-content: center;
        margin: 0;
      }

      div {
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 12px;
        padding: 24px;
        text-align: center;
      }
    </style>
    <script>
      (function () {
        var base = "/gym/";
        var search = window.location.search || "";
        var hash = window.location.hash || "";
        window.location.replace(base + search + hash);
      })();
    </script>
  </head>
  <body>
    <div>
      <strong>Redirection en cours...</strong>
      <p>Retour vers Fit Transform.</p>
    </div>
  </body>
</html>
